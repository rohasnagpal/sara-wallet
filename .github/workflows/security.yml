name: Security and transaction regression checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-lock.txt
      - name: Install locked runtime dependencies
        run: python -m pip install -r backend/requirements-lock.txt
      - name: Verify dependency consistency
        run: python -m pip check
      - name: Compile Python sources
        run: python -m compileall -q backend/app backend/tests
      - name: Run security regression suite
        env:
          PYTHONPATH: backend
        run: python -m unittest discover -s backend/tests -v
      - name: Audit locked dependencies
        run: |
          python -m pip install pip-audit==2.10.0
          python -m pip_audit -r backend/requirements-lock.txt --strict
